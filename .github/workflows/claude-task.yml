name: Claude Task

on:
  issues:
    types: [labeled]

jobs:
  run-claude-task:
    if: github.event.label.name == 'claude-task'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude task
        id: claude
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          OUTPUT=$(claude --dangerously-skip-permissions -p "$ISSUE_BODY" 2>&1)
          echo "CLAUDE_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        id: commit
        run: |
          BRANCH="claude-task/issue-${{ github.event.issue.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "claude-task: #${{ github.event.issue.number }}"
            git push origin "$BRANCH"
          fi

      - name: Post success comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.claude.outputs.CLAUDE_OUTPUT }}`;
            const branch = `claude-task/issue-${{ github.event.issue.number }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `### Claude Task Complete\n\n**Branch:** \`${branch}\`\n\n**Output:**\n\`\`\`\n${output}\n\`\`\``
            });

      - name: Post failure comment and label
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: `### Claude Task Failed\n\nThe workflow encountered an error. Check the [Actions run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              labels: ['claude-failed']
            });
