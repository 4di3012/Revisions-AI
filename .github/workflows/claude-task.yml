name: Claude Task
on:
  issues:
    types: [labeled]
jobs:
  run-claude-task:
    if: github.event.label.name == 'claude-task'
    runs-on: self-hosted
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Run Claude task
        id: claude
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: powershell
        run: |
          claude --dangerously-skip-permissions --print -p "$env:ISSUE_BODY" > claude-output.txt 2>&1
          exit 0
      - name: Commit and push changes
        shell: powershell
        run: |
          $BRANCH = "claude-task/issue-${{ github.event.issue.number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b $BRANCH
          git add -A -- ':!.github/workflows/'
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "claude-task: #${{ github.event.issue.number }}"
            git push origin $BRANCH
          } else {
            Write-Host "No changes to commit"
          }
      - name: Post success comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try { output = fs.readFileSync('claude-output.txt', 'utf8'); } catch(e) { output = 'No output captured'; }
            const branch = 'claude-task/issue-${{ github.event.issue.number }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: '### Claude Task Complete\n\n**Branch:** `' + branch + '`\n\n**Output:**\n```\n' + output + '\n```'
            });
      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: '### Claude Task Failed\n\nCheck the [Actions run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.'
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              labels: ['claude-failed']
            });